---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jit-rbac-marker-PLACEHOLDER
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookFailed
    argocd.argoproj.io/sync-wave: "98"
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/part-of: argo-jit-rbac
    jit-rbac/app: PLACEHOLDER
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jit-rbac-marker-PLACEHOLDER
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookFailed
    argocd.argoproj.io/sync-wave: "98"
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/part-of: argo-jit-rbac
    jit-rbac/app: PLACEHOLDER
rules:
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "create", "patch", "update", "bind", "escalate"]
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jit-rbac-marker-PLACEHOLDER
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookFailed
    argocd.argoproj.io/sync-wave: "98"
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/part-of: argo-jit-rbac
    jit-rbac/app: PLACEHOLDER
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: jit-rbac-marker-PLACEHOLDER
subjects:
  - kind: ServiceAccount
    name: jit-rbac-marker-PLACEHOLDER
    namespace: PLACEHOLDER_NAMESPACE
---
apiVersion: batch/v1
kind: Job
metadata:
  name: PLACEHOLDER-mark-completed
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: PostSync,PostDelete
    argocd.argoproj.io/hook-delete-policy: HookFailed,BeforeHookCreation
    argocd.argoproj.io/sync-wave: "99"
  labels:
    app.kubernetes.io/part-of: argo-jit-rbac
    jit-rbac/app: PLACEHOLDER
spec:
  ttlSecondsAfterFinished: 60
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: argo-jit-rbac
        jit-rbac/app: PLACEHOLDER
    spec:
      serviceAccountName: argocd-manager
      restartPolicy: Never
      containers:
      - name: mark-completed
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: JIT_RBAC_APP
          value: PLACEHOLDER
        - name: JIT_RBAC_TARGET_CLUSTERROLE
          value: PLACEHOLDER_TARGET_CLUSTERROLE
        - name: JIT_RBAC_MARKER_NAME
          value: jit-rbac-marker-PLACEHOLDER
        - name: JIT_RBAC_TARGET_NAMESPACE
          value: PLACEHOLDER_NAMESPACE
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -euo pipefail
            echo "========================================="
            echo "Marking sync as completed for ${JIT_RBAC_APP}"
            echo "Started at $(date -u +%FT%TZ)"
            echo "========================================="

            mark_cluster_scoped() {
              kind="$1"
              name="$2"
              if kubectl label "${kind}" "${name}" jit-rbac/sync-status=completed --overwrite >/dev/null 2>&1; then
                echo "${kind}/${name} labeled as completed"
              else
                echo "${kind}/${name} not found or not patchable"
              fi
            }

            mark_namespaced() {
              kind="$1"
              name="$2"
              namespace="$3"
              if kubectl -n "${namespace}" label "${kind}" "${name}" jit-rbac/sync-status=completed --overwrite >/dev/null 2>&1; then
                echo "${kind}/${namespace}/${name} labeled as completed"
              else
                echo "${kind}/${namespace}/${name} not found or not patchable"
              fi
            }

            mark_cluster_scoped clusterrole "${JIT_RBAC_TARGET_CLUSTERROLE}"
            mark_cluster_scoped clusterrolebinding "${JIT_RBAC_TARGET_CLUSTERROLE}"
            mark_cluster_scoped clusterrole "${JIT_RBAC_MARKER_NAME}"
            mark_cluster_scoped clusterrolebinding "${JIT_RBAC_MARKER_NAME}"
            mark_namespaced serviceaccount "${JIT_RBAC_MARKER_NAME}" "${JIT_RBAC_TARGET_NAMESPACE}"

            echo "========================================="
            echo "Successfully marked ${JIT_RBAC_APP} as completed"
            echo "Completed at $(date -u +%FT%TZ)"
            echo "========================================="
