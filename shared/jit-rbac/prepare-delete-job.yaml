---
apiVersion: batch/v1
kind: Job
metadata:
  name: PLACEHOLDER-prepare-delete
  namespace: PLACEHOLDER_NAMESPACE
  annotations:
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/part-of: argo-jit-rbac
    jit-rbac/app: PLACEHOLDER
spec:
  ttlSecondsAfterFinished: 60
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: argo-jit-rbac
        jit-rbac/app: PLACEHOLDER
    spec:
      serviceAccountName: PLACEHOLDER_SERVICEACCOUNT
      restartPolicy: Never
      containers:
      - name: prepare-delete
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: JIT_RBAC_APP
          value: PLACEHOLDER
        - name: ARGOCD_MANAGER_DELETE_RBAC_NAME
          value: PLACEHOLDER-delete-rbac
        - name: DELETE_ROLE_TEMPLATE_NAMESPACE
          value: PLACEHOLDER_NAMESPACE
        - name: DELETE_ROLE_TEMPLATE_CONFIGMAP_NAME
          value: PLACEHOLDER-delete-template
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -euo pipefail
            echo "========================================="
            echo "Preparing delete-time RBAC for ${JIT_RBAC_APP}"
            echo "Started at $(date -u +%FT%TZ)"
            echo "========================================="

            # Read ClusterRole template from ConfigMap
            DELETE_ROLE_TEMPLATE="$(kubectl get configmap "${DELETE_ROLE_TEMPLATE_CONFIGMAP_NAME}" \
              -n "${DELETE_ROLE_TEMPLATE_NAMESPACE}" \
              -o go-template='{{ index .data "delete-clusterrole.yaml" }}')"

            if [ -z "${DELETE_ROLE_TEMPLATE}" ]; then
              echo "Delete ClusterRole template is empty"
              exit 1
            fi

            # Read ClusterRoleBinding template from ConfigMap
            DELETE_BINDING_TEMPLATE="$(kubectl get configmap "${DELETE_ROLE_TEMPLATE_CONFIGMAP_NAME}" \
              -n "${DELETE_ROLE_TEMPLATE_NAMESPACE}" \
              -o go-template='{{ index .data "delete-clusterrolebinding.yaml" }}')"

            if [ -z "${DELETE_BINDING_TEMPLATE}" ]; then
              echo "Delete ClusterRoleBinding template is empty"
              exit 1
            fi

            # Apply ClusterRole
            printf '%s\n' "${DELETE_ROLE_TEMPLATE}" \
              | sed \
                  -e "s|__JIT_RBAC_APP__|${JIT_RBAC_APP}|g" \
                  -e "s|__ARGOCD_MANAGER_DELETE_RBAC_NAME__|${ARGOCD_MANAGER_DELETE_RBAC_NAME}|g" \
              | kubectl apply -f -

            # Apply ClusterRoleBinding
            printf '%s\n' "${DELETE_BINDING_TEMPLATE}" \
              | sed \
                  -e "s|__JIT_RBAC_APP__|${JIT_RBAC_APP}|g" \
                  -e "s|__ARGOCD_MANAGER_DELETE_RBAC_NAME__|${ARGOCD_MANAGER_DELETE_RBAC_NAME}|g" \
              | kubectl apply -f -

            echo "========================================="
            echo "Delete-time RBAC prepared for ${JIT_RBAC_APP}"
            echo "Completed at $(date -u +%FT%TZ)"
            echo "========================================="
