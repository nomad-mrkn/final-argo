---
apiVersion: batch/v1
kind: Job
metadata:
  name: PLACEHOLDER-mark-deleted
  namespace: PLACEHOLDER_NAMESPACE
  annotations:
    argocd.argoproj.io/hook: PostDelete
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
    argocd.argoproj.io/sync-wave: "90"
  labels:
    app.kubernetes.io/part-of: argo-jit-rbac
    jit-rbac/app: PLACEHOLDER
spec:
  ttlSecondsAfterFinished: 60
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: argo-jit-rbac
        jit-rbac/app: PLACEHOLDER
    spec:
      serviceAccountName: argocd-manager
      restartPolicy: Never
      containers:
      - name: mark-deleted
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: JIT_RBAC_APP
          value: PLACEHOLDER
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -euo pipefail
            echo "========================================="
            echo "Marking delete RBAC as completed for ${JIT_RBAC_APP}"
            echo "Started at $(date -u +%FT%TZ)"
            echo "========================================="

            # Label ClusterRoles created by prepare-delete job
            if kubectl label clusterrole -l jit-rbac/app=${JIT_RBAC_APP} \
              jit-rbac/sync-status=completed --overwrite 2>/dev/null; then
              echo "ClusterRole labeled successfully"
            else
              echo "No ClusterRoles found with label jit-rbac/app=${JIT_RBAC_APP} (may already be cleaned up)"
            fi

            # Label ClusterRoleBindings created by prepare-delete job
            if kubectl label clusterrolebinding -l jit-rbac/app=${JIT_RBAC_APP} \
              jit-rbac/sync-status=completed --overwrite 2>/dev/null; then
              echo "ClusterRoleBinding labeled successfully"
            else
              echo "No ClusterRoleBindings found with label jit-rbac/app=${JIT_RBAC_APP} (may already be cleaned up)"
            fi

            echo "========================================="
            echo "Successfully marked delete RBAC for ${JIT_RBAC_APP}"
            echo "Completed at $(date -u +%FT%TZ)"
            echo "========================================="
