apiVersion: batch/v1
kind: Job
metadata:
  name: PLACEHOLDER-empty-role
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookFailed,BeforeHookCreation
    argocd.argoproj.io/sync-wave: "100"
  labels:
    app.kubernetes.io/part-of: argo-jit-rbac
    jit-rbac/app: PLACEHOLDER
spec:
  ttlSecondsAfterFinished: 60
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: argo-jit-rbac
        jit-rbac/app: PLACEHOLDER
    spec:
      serviceAccountName: jit-rbac-marker-PLACEHOLDER
      restartPolicy: Never
      containers:
      - name: empty-role
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: JIT_RBAC_APP
          value: PLACEHOLDER
        - name: JIT_RBAC_TARGET_CLUSTERROLE
          value: PLACEHOLDER_TARGET_CLUSTERROLE
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -euo pipefail
            echo "========================================="
            echo "Emptying ClusterRole rules for ${JIT_RBAC_APP}"
            echo "Target ClusterRole: ${JIT_RBAC_TARGET_CLUSTERROLE}"
            echo "Started at $(date -u +%FT%TZ)"
            echo "========================================="

            kubectl patch clusterrole "${JIT_RBAC_TARGET_CLUSTERROLE}" \
              --type='merge' \
              -p '{"rules":[]}'

            kubectl label clusterrole "${JIT_RBAC_TARGET_CLUSTERROLE}" \
              jit-rbac/sync-status=empty \
              --overwrite

            echo "========================================="
            echo "ClusterRole ${JIT_RBAC_TARGET_CLUSTERROLE} rules emptied"
            echo "Completed at $(date -u +%FT%TZ)"
            echo "========================================="
