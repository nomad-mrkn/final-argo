apiVersion: batch/v1
kind: Job
metadata:
  name: PLACEHOLDER-refill-role
  namespace: kube-system
  annotations:
    argocd.argoproj.io/hook: PreDelete
    argocd.argoproj.io/hook-delete-policy: HookFailed,BeforeHookCreation
    argocd.argoproj.io/sync-wave: "99"
  labels:
    app.kubernetes.io/part-of: argo-jit-rbac
    jit-rbac/app: PLACEHOLDER
spec:
  ttlSecondsAfterFinished: 60
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: argo-jit-rbac
        jit-rbac/app: PLACEHOLDER
    spec:
      serviceAccountName: argocd-manager
      restartPolicy: Never
      containers:
      - name: refill-role
        image: bitnami/kubectl:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: JIT_RBAC_APP
          value: PLACEHOLDER
        - name: JIT_RBAC_TARGET_CLUSTERROLE
          value: PLACEHOLDER_TARGET_CLUSTERROLE
        - name: JIT_RBAC_TARGET_NAMESPACE
          value: PLACEHOLDER_NAMESPACE
        - name: JIT_RBAC_ROLE_YAML
          value: PLACEHOLDER_ROLE_YAML
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -euo pipefail
            echo "========================================="
            echo "Refilling RBAC for ${JIT_RBAC_APP}"
            echo "Target role: ${JIT_RBAC_TARGET_CLUSTERROLE}"
            echo "Target namespace: ${JIT_RBAC_TARGET_NAMESPACE}"
            echo "Started at $(date -u +%FT%TZ)"
            echo "========================================="

            # Apply ClusterRole and ClusterRoleBinding from embedded YAML
            echo "${JIT_RBAC_ROLE_YAML}" | kubectl apply -f -

            echo "========================================="
            echo "RBAC restored for ${JIT_RBAC_APP}"
            echo "Completed at $(date -u +%FT%TZ)"
            echo "========================================="
