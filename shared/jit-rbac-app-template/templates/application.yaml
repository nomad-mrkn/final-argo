{{- $appName := printf "%s-%s" .Values.appPrefix .Values.app -}}
{{- $roleName := printf "argocd-manager-%s" .Values.app -}}
{{- $markerName := printf "jit-rbac-marker-%s" $appName -}}
{{- $deleteTemplateName := printf "jit-rbac-delete-template-%s" $appName -}}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $appName }}
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: {{ $roleName }}
      jsonPointers:
        - /metadata/labels/jit-rbac~1sync-status
        - /metadata/annotations
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      name: {{ $roleName }}
      jsonPointers:
        - /metadata/labels/jit-rbac~1sync-status
        - /metadata/annotations
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
      name: {{ $markerName }}
      jsonPointers:
        - /metadata/labels/jit-rbac~1sync-status
        - /metadata/annotations
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
      name: {{ $markerName }}
      jsonPointers:
        - /metadata/labels/jit-rbac~1sync-status
        - /metadata/annotations
    - group: ""
      kind: ServiceAccount
      name: {{ $markerName }}
      jsonPointers:
        - /metadata/labels/jit-rbac~1sync-status
        - /metadata/annotations
  destination:
    name: {{ .Values.clusterName }}
    namespace: {{ .Values.namespace }}
  sources:
    # Source 1: App-specific JIT RBAC roles and delete template
    - repoURL: {{ .Values.repoURL | quote }}
      targetRevision: {{ .Values.targetRevision }}
      path: shared/jit-rbac-roles
      directory:
        include: {{ printf "%s-role.yaml" .Values.app | quote }}
    # Source 2: Hook jobs (PostSync / PreDelete / PostDelete)
    - repoURL: {{ .Values.repoURL | quote }}
      targetRevision: {{ .Values.targetRevision }}
      path: shared/jit-rbac
      kustomize:
        commonLabels:
          jit-rbac/app: {{ $appName }}
        patches:
          - target:
              kind: Job
              name: PLACEHOLDER-prepare-delete
            patch: |-
              - op: replace
                path: /metadata/name
                value: {{ $appName }}-prepare-delete
              - op: replace
                path: /metadata/namespace
                value: kube-system
              - op: replace
                path: /spec/template/spec/serviceAccountName
                value: argocd-manager
              - op: replace
                path: /spec/template/spec/containers/0/env/0/value
                value: {{ $appName }}
              - op: replace
                path: /spec/template/spec/containers/0/env/1/value
                value: {{ $roleName }}-delete
              - op: replace
                path: /spec/template/spec/containers/0/env/2/value
                value: {{ .Values.namespace }}
              - op: replace
                path: /spec/template/spec/containers/0/env/3/value
                value: {{ $deleteTemplateName }}
          - target:
              kind: ServiceAccount
              name: jit-rbac-marker-PLACEHOLDER
            patch: |-
              - op: replace
                path: /metadata/name
                value: {{ $markerName }}
          - target:
              kind: ClusterRole
              name: jit-rbac-marker-PLACEHOLDER
            patch: |-
              - op: replace
                path: /metadata/name
                value: {{ $markerName }}
          - target:
              kind: ClusterRoleBinding
              name: jit-rbac-marker-PLACEHOLDER
            patch: |-
              - op: replace
                path: /metadata/name
                value: {{ $markerName }}
              - op: replace
                path: /roleRef/name
                value: {{ $markerName }}
              - op: replace
                path: /subjects/0/name
                value: {{ $markerName }}
              - op: replace
                path: /subjects/0/namespace
                value: {{ .Values.namespace }}
          - target:
              kind: Job
              name: PLACEHOLDER-mark-completed
            patch: |-
              - op: replace
                path: /metadata/name
                value: {{ $appName }}-mark-completed
              - op: replace
                path: /spec/template/spec/serviceAccountName
                value: {{ $markerName }}
              - op: replace
                path: /spec/template/spec/containers/0/env/0/value
                value: {{ $appName }}
          - target:
              kind: Job
              name: PLACEHOLDER-mark-deleted
            patch: |-
              - op: replace
                path: /metadata/name
                value: {{ $appName }}-mark-deleted
              - op: replace
                path: /metadata/namespace
                value: kube-system
              - op: replace
                path: /spec/template/spec/containers/0/env/0/value
                value: {{ $appName }}
    # Source 3: Helm chart
    - repoURL: {{ .Values.chartRepo | quote }}
      targetRevision: {{ .Values.targetRevision }}
      path: {{ .Values.chartPath }}
      helm:
        releaseName: {{ $appName }}
        {{- if .Values.helmValues }}
        values: |
{{ .Values.helmValues | indent 10 }}
        {{- end }}
