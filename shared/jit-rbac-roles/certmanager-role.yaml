apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-manager-certmanager
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookFailed,BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/part-of: argo-jit-rbac
    jit-rbac/app: k8s-spb2-backend1-certmanager
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["create", "update", "patch", "get", "list", "watch"]
  
  - apiGroups: ["cert-manager.io"]
    resources:
      - certificates
      - certificaterequests
      - issuers
      - clusterissuers
      - certificaterequests/status
      - certificaterequests/finalizers
      - certificates/status
      - certificates/finalizers
      - clusterissuers/status
      - issuers/status
    verbs: ["create", "update", "patch", "get", "list", "watch", "delete"]
  
  - apiGroups: ["acme.cert-manager.io"]
    resources:
      - orders
      - orders/status
      - orders/finalizers
      - challenges
      - challenges/status
      - challenges/finalizers
    verbs: ["create", "delete", "get", "list", "watch", "update", "patch"]
  
  - apiGroups: ["certificates.k8s.io"]
    resources:
      - certificatesigningrequests
      - certificatesigningrequests/status
    verbs: ["get", "list", "watch", "update", "patch"]
  
  - apiGroups: ["certificates.k8s.io"]
    resources: ["signers"]
    verbs: ["sign"]
  
  - apiGroups: ["cert-manager.io"]
    resources: ["signers"]
    verbs: ["approve"]
  
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - gateways
      - gateways/finalizers
      - httproutes
      - httproutes/finalizers
    verbs: ["get", "list", "watch", "update", "patch"]
  
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - ingresses/finalizers
    verbs: ["get", "list", "watch", "update", "patch"]
  
  - apiGroups: ["route.openshift.io"]
    resources: ["routes/custom-host"]
    verbs: ["create"]
  
  - apiGroups: ["admissionregistration.k8s.io"]
    resources:
      - mutatingwebhookconfigurations
      - validatingwebhookconfigurations
    verbs: ["create", "update", "patch", "get", "list", "watch", "delete"]
  
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs: ["create", "update", "patch", "get", "list", "watch", "delete"]
  
  - apiGroups: [""]
    resources:
      - serviceaccounts
      - services
      - configmaps
      - secrets
      - pods
      - pods/log
      - events
    verbs: ["create", "update", "patch", "get", "list", "watch", "delete"]
  
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["create", "get", "list", "watch"]
  
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
  
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
    verbs: ["get", "list", "create", "update", "patch"]
  
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
  
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create", "update", "patch", "get", "list", "watch"]

  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "delete", "list", "get", "watch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-manager-certmanager
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookFailed,BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/part-of: argo-jit-rbac
    jit-rbac/app: k8s-spb2-backend1-certmanager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-manager-certmanager
subjects:
  - kind: ServiceAccount
    name: argocd-manager
    namespace: kube-system
---
# ConfigMap with delete RBAC templates (used by prepare-delete Job)
apiVersion: v1
kind: ConfigMap
metadata:
  name: jit-rbac-delete-template-k8s-spb2-backend1-certmanager
  namespace: cert-manager
